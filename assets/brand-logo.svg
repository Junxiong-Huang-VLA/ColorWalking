<svg width="1024" height="512" viewBox="0 0 1024 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9fbff"/>
      <stop offset="100%" stop-color="#f2f6ff"/>
    </linearGradient>
    <linearGradient id="tileBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ea"/>
      <stop offset="100%" stop-color="#e7f2ff"/>
    </linearGradient>
    <linearGradient id="sheepBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f3f7ff"/>
    </linearGradient>
    <linearGradient id="titleInk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#203155"/>
      <stop offset="100%" stop-color="#1a2948"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#2d477d" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="512" rx="32" fill="url(#pageBg)"/>

  <rect x="46" y="34" width="932" height="332" rx="26" fill="#f5f8ff" stroke="#dce6fa"/>
  <rect x="70" y="58" width="882" height="284" rx="20" fill="#f8faff"/>

  <g transform="translate(116,120)" filter="url(#softShadow)">
    <rect x="0" y="0" width="196" height="196" rx="30" fill="url(#tileBg)"/>
    <rect x="28" y="28" width="140" height="140" rx="24" fill="#f3f8ff"/>

    <g transform="translate(98,98)">
      <ellipse cx="0" cy="14" rx="58" ry="46" fill="url(#sheepBody)" stroke="#dfe8f7" stroke-width="3"/>
      <circle cx="-28" cy="-12" r="13" fill="#f8f2e8"/>
      <circle cx="28" cy="-12" r="13" fill="#f8f2e8"/>
      <circle cx="0" cy="14" r="28" fill="#fffefb" stroke="#ebf1fc" stroke-width="2"/>

      <circle cx="-10" cy="8" r="3.5" fill="#223459"/>
      <circle cx="10" cy="8" r="3.5" fill="#223459"/>
      <path d="M-12 24 Q0 33 12 24" fill="none" stroke="#223459" stroke-width="3.2" stroke-linecap="round"/>

      <path d="M-42 -36 C-22 -58, 22 -58, 42 -36" fill="none" stroke="#ff9dae" stroke-width="6" stroke-linecap="round"/>
      <path d="M-22 -35 C-12 -46, -2 -46, 8 -35" fill="none" stroke="#7db6ff" stroke-width="4.8" stroke-linecap="round"/>
      <path d="M-4 -33 C6 -42, 16 -42, 26 -33" fill="none" stroke="#ffd46d" stroke-width="4.8" stroke-linecap="round"/>
    </g>

    <text x="98" y="186" text-anchor="middle" font-size="19" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" fill="#243557" font-weight="600">像素小羊卷</text>
  </g>

  <text x="370" y="172" font-size="82" font-weight="700" letter-spacing="-1" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" fill="url(#titleInk)">ColorWalking</text>
  <text x="370" y="236" font-size="40" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" fill="#3f5378">Walk in color, walk in mood.</text>

  <text x="370" y="320" font-size="30" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" fill="#5f7398">今日小提示：不用很多力气，你已经在认真生活了。</text>
